{% extends 'base.html' %}
{% load static %}

{% block title %}Messages{% endblock %}

{% block content %}
<main>
    <section id="messages">
        <div id="texts">
            {% for message in messages %}
                <div class="message">
                    <div class="msg_metadata">
                        <span class="message_sender">{{message.user}}</span>
                        <span class="message_timestamp">{{message.timestamp}}</span>
                    </div>
                    <div class="msg_texts">
                        <p>{{message.content}}</p>
                    </div>
                </div>
            {% endfor %}
        </div>
        <form id="enter_text" method="post" action="">
            {% csrf_token %}
            <input type="hidden" name="fullname">
            <input type="hidden" name="timestamp">
            <div id="msg_input_group">
                <input type="text" name="content" id="msg_content" placeholder="Aa">
                <button id="submit">Send</button>
            </div>
        </form>
    </section>
    <script language="javascript">
        var ws_url = 'ws://' + window.location.host + '/ws/ticks/';
        var ticksSocket = new WebSocket(ws_url);

        ticksSocket.onmessage = function(event) {
            var data = JSON.parse(event.data);
            console.log('data', data);
            // do whatever required with received data ...
        };
    </script>
</main>
{% endblock %}
