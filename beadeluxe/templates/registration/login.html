{% extends 'base.html' %}

{% block header %} Login Page {% endblock %}

{% block content %}
<main id="login-page">
    <div class="login-card">
        {% if form.errors %}
            <div class="error-box">
                Invalid username or password.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="inputs">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>

            <div class="inputs">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <a href="{% url 'password_reset' %}" class="forgot-link">
            Forgot password?
        </a>
    </div>
</main>
{% endblock %}
